version: "3.9"

services:
  oracle:
    container_name: oracle
    image: gvenzl/oracle-xe:21-slim   # Popular, lightweight Oracle XE image
    restart: always
    environment:
      ORACLE_PASSWORD: oracle         # SYSTEM/SYS password
      ORACLE_DATABASE: dolphinscheduler
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"   # Oracle listener
      - "5500:5500"   # EM Express (optional)
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      # Equivalent to pg_isready: run a quick SELECT inside the DB
      test: ["CMD-SHELL", "echo 'select 1 from dual;' | sqlplus -s system/$${ORACLE_PASSWORD}@localhost:1521/$${ORACLE_DATABASE} > /dev/null || exit 1"]
      interval: 5s
      timeout: 60s
      retries: 120

volumes:
  oracle-data:
